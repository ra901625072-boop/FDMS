services:
  # A managed PostgreSQL database
  - type: pgo
    name: fdms-db
    plan: free
    version: "16"

  # The web service containing the backend and frontend
  - type: web
    name: fdms-web
    env: python
    plan: free
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      # Inject the DATABASE_URL from the managed DB
      - key: DATABASE_URL
        fromDatabase:
          name: fdms-db
          property: connectionString
      # Set app environment to production
      - key: APP_ENV
        value: production
      # Generate a strong, secure random JWT secret automatically
      - key: JWT_SECRET
        generateValue: true
      
      # NOTE: Storage Configuration
      # Fill these in on the Render Dashboard manually to enable cloud storage.
      # You can delete MEGA_EMAIL/MEGA_PASSWORD if you decide to use Google Drive instead.
      - key: MEGA_EMAIL
        sync: false
      - key: MEGA_PASSWORD
        sync: false
